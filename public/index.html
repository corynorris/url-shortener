<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shorten a URL</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f6f8fa;
        color: #24292f;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
        padding: 4rem 1.25rem;
      }
      h1 {
        margin-bottom: 0.5rem;
        font-size: 2.25rem;
      }
      h2 {
        color: #57606a;
        font-size: 1rem;
        margin-top: 2rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #57606a;
        line-height: 1.5;
      }
      form {
        display: flex;
        gap: 0.75rem;
        margin: 2rem 0 1rem;
      }
      input {
        flex: 1;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        font: inherit;
        padding: 0.75rem 0.875rem;
        min-width: 0;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: #0969da;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 0.75rem 1rem;
      }
      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }
      code {
        background: #eef1f4;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
      }
      .result {
        display: none;
        background: #ffffff;
        border: 1px solid #d0d7de;
        padding: 1rem;
        border-radius: 6px;
        margin-top: 1rem;
      }
      .result.visible {
        display: block;
      }
      a {
        color: #0969da;
        overflow-wrap: anywhere;
      }
      .error {
        color: #cf222e;
        margin-top: 0.75rem;
      }
      .toolbar {
        align-items: center;
        display: flex;
        gap: 0.75rem;
        margin-top: 2rem;
      }
      .url-list {
        display: grid;
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .url-item {
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 1rem;
      }
      .url-item-header {
        align-items: baseline;
        display: flex;
        gap: 0.75rem;
        justify-content: space-between;
      }
      .url-id {
        color: #57606a;
        font-size: 0.875rem;
      }
      .url-target {
        color: #57606a;
        font-size: 0.875rem;
        margin-top: 0.4rem;
        overflow-wrap: anywhere;
      }
      .empty {
        border: 1px dashed #d0d7de;
        border-radius: 6px;
        color: #57606a;
        margin-top: 1rem;
        padding: 1rem;
      }
      @media (max-width: 560px) {
        form,
        .toolbar,
        .url-item-header {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Shorten a URL</h1>
      <p>Paste a public URL and get a compact link under this demo domain.</p>

      <form id="shorten-form">
        <input
          id="url-input"
          type="url"
          placeholder="https://example.com/article"
          autocomplete="url"
          required
        />
        <button type="submit">Shorten</button>
      </form>

      <div id="result" class="result"></div>
      <div id="error" class="error" role="alert"></div>

      <div class="toolbar">
        <input
          id="search-input"
          type="search"
          placeholder="Search stored URLs"
          autocomplete="off"
        />
        <button id="search-button" type="button">Search</button>
      </div>
      <div id="url-list" class="url-list"></div>

      <h2>API</h2>
      <p>
        Create links with <code>POST /s/api/urls</code>, list links with
        <code>GET /s/api/urls?q=example</code>, or use legacy
        <code>GET /s/new/https://example.com</code>.
      </p>

      <p style="margin-top: 2rem; color: #484f58">
        Built with <a href="https://expressjs.com">Express</a> and
        <a href="https://mongodb.com">MongoDB</a>.
      </p>
    </div>
    <script>
      const form = document.getElementById("shorten-form");
      const input = document.getElementById("url-input");
      const result = document.getElementById("result");
      const error = document.getElementById("error");
      const button = form.querySelector("button");
      const searchInput = document.getElementById("search-input");
      const searchButton = document.getElementById("search-button");
      const urlList = document.getElementById("url-list");
      const basePath = window.location.pathname.replace(/\/$/, "");
      const apiUrl = `${basePath}/api/urls`;

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return entities[char];
        });
      }

      function renderUrls(urls) {
        if (!urls.length) {
          urlList.innerHTML = '<div class="empty">No stored URLs found.</div>';
          return;
        }

        urlList.innerHTML = urls
          .map(
            (url) => `
              <article class="url-item">
                <div class="url-item-header">
                  <a href="${escapeHtml(url.short_url)}">${escapeHtml(url.short_url)}</a>
                  <span class="url-id">#${url.id}</span>
                </div>
                <div class="url-target">${escapeHtml(url.given_url)}</div>
              </article>
            `,
          )
          .join("");
      }

      async function loadUrls() {
        const query = searchInput.value.trim();
        const response = await fetch(
          `${apiUrl}${query ? `?q=${encodeURIComponent(query)}` : ""}`,
        );
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Could not load stored URLs");
        }
        renderUrls(data);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.classList.remove("visible");
        result.textContent = "";
        error.textContent = "";
        button.disabled = true;

        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: input.value }),
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Could not shorten that URL");
          }

          result.innerHTML = `Short URL: <a href="${data.short_url}">${data.short_url}</a>`;
          result.classList.add("visible");
          input.value = "";
          await loadUrls();
        } catch (err) {
          error.textContent = err.message || "Could not shorten that URL";
        } finally {
          button.disabled = false;
        }
      });

      searchButton.addEventListener("click", () => {
        error.textContent = "";
        loadUrls().catch((err) => {
          error.textContent = err.message || "Could not load stored URLs";
        });
      });

      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          searchButton.click();
        }
      });

      loadUrls().catch((err) => {
        error.textContent = err.message || "Could not load stored URLs";
      });
    </script>
  </body>
</html>
