<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        max-width: 640px;
        width: 100%;
        padding: 2rem;
      }
      h1 {
        color: #58a6ff;
        margin-bottom: 1rem;
        font-size: 2rem;
      }
      h2 {
        color: #f0883e;
        margin-top: 2rem;
        margin-bottom: 0.5rem;
      }
      code {
        background: #161b22;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
        color: #7ee787;
      }
      pre {
        background: #161b22;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        margin: 0.5rem 0 1rem;
      }
      .example {
        color: #8b949e;
        margin: 0.5rem 0;
      }
      a {
        color: #58a6ff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>URL Shortener</h1>
      <p>A simple URL shortening microservice.</p>

      <h2>Create a short URL</h2>
      <p class="example">POST or GET <code>/new/https://example.com</code></p>
      <pre>
{"short_url":"https://your-domain/1","given_url":"https://example.com"}</pre>

      <h2>Use it</h2>
      <p>Visit <code>/1</code> to be redirected to the original URL.</p>

      <p style="margin-top: 2rem; color: #484f58">
        Built with <a href="https://expressjs.com">Express</a> and
        <a href="https://mongodb.com">MongoDB</a>.
      </p>
    </div>
  </body>
</html>
